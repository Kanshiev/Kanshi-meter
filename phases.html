<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пофазный мониторинг</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #e2f3e5;
            display: flex; justify-content: center; padding: 15px; margin: 0;
        }
        .widget-container { width: 100%; max-width: 500px; }
        
        .main-card {
            background: white; border-radius: 28px; padding: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .total-label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .total-value { font-size: 5rem; font-weight: 900; margin: 5px 0; line-height: 1; color: #1a1a1a; }
        .unit { color: #666; font-size: 1.1rem; font-weight: 500; margin-bottom: 15px; }

        /* Переехавший блок цены */
        .price-inline {
            display: inline-block; background: #f4f6f8; padding: 8px 16px; border-radius: 12px;
            color: #444; font-weight: 700; font-size: 1rem; border: 1px solid #eee;
        }

        .phases-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .phase-card {
            background: white; border-radius: 28px; padding: 20px 10px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
        }
        .phase-name { font-weight: 900; color: #eee; margin-bottom: 15px; font-size: 1.2rem; }
        
        /* СУПЕР-ЖИРНЫЙ индикатор */
        .gauge-container {
            width: 50px; height: 200px; background: #f0f0f0; border-radius: 12px;
            position: relative; margin-bottom: 15px; overflow: visible;
        }
        .zero-line {
            position: absolute; top: 50%; left: -6px; right: -6px;
            height: 3px; background: #ccc; z-index: 3; border-radius: 4px;
        }
        .gauge-bar {
            position: absolute; left: 0; width: 100%; height: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 2; border-radius: 6px;
        }
        
        .p-watt { font-weight: 900; font-size: 1.3rem; color: #1a1a1a; }
        .p-volt { font-size: 0.75rem; color: #bbb; margin-top: 4px; font-weight: 700; }

        .nav-btn {
            display: block; width: 100%; padding: 20px; margin-top: 15px;
            background-color: #2c3e50; color: white; border: none; border-radius: 20px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            text-decoration: none; text-align: center; box-sizing: border-box;
        }
        .text-export { color: #8e44ad !important; }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="main-card">
        <div class="total-label" id="status-text">Баланс сети</div>
        <div class="total-value" id="total-power">--</div>
        <div class="unit">Ватт</div>
        
        <div class="price-inline">
            ⚡ Цена: <span id="current-price-val">--</span> c
        </div>
    </div>

    <div class="phases-grid">
        <div class="phase-card">
            <div class="phase-name">L1</div>
            <div class="gauge-container">
                <div class="zero-line"></div>
                <div id="bar-0" class="gauge-bar"></div>
            </div>
            <div class="p-watt" id="watt-0">--</div>
            <div class="p-volt" id="volt-0">--</div>
        </div>
        <div class="phase-card">
            <div class="phase-name">L2</div>
            <div class="gauge-container">
                <div class="zero-line"></div>
                <div id="bar-1" class="gauge-bar"></div>
            </div>
            <div class="p-watt" id="watt-1">--</div>
            <div class="p-volt" id="volt-1">--</div>
        </div>
        <div class="phase-card">
            <div class="phase-name">L3</div>
            <div class="gauge-container">
                <div class="zero-line"></div>
                <div id="bar-2" class="gauge-bar"></div>
            </div>
            <div class="p-watt" id="watt-2">--</div>
            <div class="p-volt" id="volt-2">--</div>
        </div>
    </div>

    <a href="index.html" class="nav-btn">← Назад на главную</a>
</div>

<script>
    function getLoadColor(watt) {
        const absW = Math.abs(watt);
        if (watt < -10) return '#a78bfa';
        if (absW <= 1000) return '#2ecc71';
        if (absW <= 2000) return '#f1c40f';
        if (absW <= 5000) return '#e67e22';
        return '#e74c3c';
    }

    async function updateData() {
        try {
            // Подтягиваем цену
            const pRes = await fetch('https://api.spot-hinta.fi/TodayAndDayForward');
            const pData = await pRes.json();
            const now = new Date();
            const quarter = Math.floor(now.getMinutes() / 15) * 15;
            const refT = new Date(now); refT.setMinutes(quarter, 0, 0);
            const sStr = refT.toLocaleString('sv-SE').replace(' ', 'T').substring(0, 16);
            const pObj = pData.find(s => s.DateTime.includes(sStr));
            if (pObj) {
                const val = pObj.PriceWithTax * 100;
                document.getElementById('current-price-val').innerText = Math.abs(val) < 2 ? val.toFixed(1) : Math.round(val);
            }

            // Данные Shelly
            const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/status';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
            const requestBody = 'id=483fdac39873&auth_key=MWEzMWI0dWlk07E8AECF7EC066046A87D6410853E336FBB1D6F260B8376F3C047EE699E8019EA03F97657F6EF690';

            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: requestBody
            });
            const res = await response.json();

            if (res.isok) {
                const emeters = res.data.device_status.emeters;
                let totalSum = 0;

                emeters.forEach((phase, i) => {
                    const watt = phase.power;
                    totalSum += watt;
                    document.getElementById(`watt-${i}`).innerText = Math.round(watt);
                    document.getElementById(`volt-${i}`).innerText = Math.round(phase.voltage) + 'V';

                    const bar = document.getElementById(`bar-${i}`);
                    // Шкала до 6000 Вт для запаса
                    let hPerc = (Math.min(Math.abs(watt), 6000) / 6000) * 50;

                    bar.style.height = hPerc + '%';
                    bar.style.backgroundColor = getLoadColor(watt);
                    
                    if (watt >= 0) {
                        bar.style.bottom = '50%'; bar.style.top = 'auto';
                        bar.style.borderRadius = '6px 6px 0 0';
                    } else {
                        bar.style.top = '50%'; bar.style.bottom = 'auto';
                        bar.style.borderRadius = '0 0 6px 6px';
                    }
                });

                const tEl = document.getElementById('total-power');
                const sEl = document.getElementById('status-text');
                const tVal = Math.round(totalSum);
                tEl.innerText = tVal;

                if (tVal < 0) {
                    tEl.classList.add('text-export');
                    sEl.innerText = "Экспорт в сеть ☀️";
                } else {
                    tEl.classList.remove('text-export');
                    sEl.innerText = "Потребление из сети";
                }
            }
        } catch (e) { console.error(e); }
    }

    updateData();
    setInterval(updateData, 5000);
</script>
</body>
</html>
