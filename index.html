<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanshi-meter 3.0</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            --bg-color: #faf8f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --accent-green: #a8dcba;
            --accent-yellow: #f7dc8f;
            --accent-red: #ee8888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .price-label { font-size: 16px; opacity: 0.7; margin-bottom: 5px; }
        .price-value { font-size: 80px; font-weight: 900; line-height: 1; margin: 10px 0; }
        .price-unit { font-size: 18px; opacity: 0.7; }

        .status-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 15px; border-radius: 15px;
            font-weight: bold; margin: 15px 0;
        }
        .status-cheap { background-color: var(--accent-green); color: #2d5a27; }
        .status-normal { background-color: var(--accent-yellow); color: #7d6608; }
        .status-wait { background-color: var(--accent-red); color: #7b241c; }

        .timer-text { font-size: 14px; opacity: 0.8; margin-bottom: 15px; font-variant-numeric: tabular-nums;}

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; border-top: 1px solid #eee; padding-top: 20px;
        }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 11px; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }

        .update-time { font-size: 10px; opacity: 0.3; margin-top: 10px; }

        .nav-btn {
            display: block; width: 100%; padding: 16px;
            background-color: #2c3e50; color: white;
            border: none; border-radius: 16px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            text-decoration: none; text-align: center; box-sizing: border-box;
        }
        
        .chart-container { width: 100%; height: 120px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="price-label">Цена сейчас</div>
            <div class="price-value" id="current-price">--</div>
            <div class="price-unit">центов / кВтч</div>

            <div id="status-box" class="status-bar status-normal">
                <span id="status-icon">⏳</span>
                <span id="status-text">Загрузка...</span>
            </div>

            <div class="timer-text" id="timer-display">Синхронизация...</div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val" id="shelly-power">0</span>
                    <span class="stat-label">Ватт сейчас</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="shelly-load">0.00</span>
                    <span class="stat-label">кВт·ч сегодня</span>
                </div>
            </div>
            <div class="update-time" id="last-update">Обновлено: --:--:--</div>
        </div>

        <div class="card">
            <div class="chart-container">
                <canvas id="miniChart"></canvas>
            </div>
        </div>

        <a href="charts.html" class="nav-btn">📊 График на сегодня и завтра</a>
    </div>

    <script>
        const SHELLY_ID = "483fdac39873";
        const AUTH_KEY = "MWEzMWI0dWlk07E8AECF7EC066046A87D6410853E336FBB1D6F260B8376F3C047EE699E8019EA03F97657F6EF690";
        const PRICE_SELL_CENTS = 10.0;

        let miniChartInstance = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('timer-display').innerText = `Цена поменяется через ${59 - now.getMinutes()} мин ${59 - now.getSeconds()} сек`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function updateData() {
            try {
                const priceRes = await fetch('https://api.spot-hinta.fi/JustNow');
                const priceData = await priceRes.json();
                const price = parseFloat((priceData.PriceWithTax * 100).toFixed(1));
                document.getElementById('current-price').innerText = price;

                const statusBox = document.getElementById('status-box');
                const statusText = document.getElementById('status-text');
                const statusIcon = document.getElementById('status-icon');

                statusBox.className = 'status-bar';
                if (price > PRICE_SELL_CENTS) {
                    statusBox.classList.add('status-wait'); statusText.innerText = "Дорого. Ждём."; statusIcon.innerText = "🛑";
                } else if (price <= 5) {
                    statusBox.classList.add('status-cheap'); statusText.innerText = "Дёшево! Включай."; statusIcon.innerText = "✅";
                } else {
                    statusBox.classList.add('status-normal'); statusText.innerText = "Нормально. Пользуемся."; statusIcon.innerText = "⚖️";
                }

                const shellyRes = await fetch('https://shelly-70-eu.shelly.cloud/device/status', {
                    method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `id=${SHELLY_ID}&auth_key=${AUTH_KEY}`
                });
                const shellyData = await shellyRes.json();

                if (shellyData.isok) {
                    const emeters = shellyData.data.device_status.emeters;
                    document.getElementById('shelly-power').innerText = Math.round(emeters.reduce((s, p) => s + p.power, 0));

                    let totalWh = emeters.reduce((s, p) => s + (p.total || 0), 0);
                    let todayStr = new Date().toLocaleDateString('ru-RU');
                    if (localStorage.getItem('k_date') !== todayStr) {
                        localStorage.setItem('k_date', todayStr);
                        localStorage.setItem('k_start', totalWh);
                    }
                    let consumedKwh = (totalWh - parseFloat(localStorage.getItem('k_start') || totalWh)) / 1000;
                    document.getElementById('shelly-load').innerText = Math.max(0, consumedKwh).toFixed(2);
                }
                document.getElementById('last-update').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;
            } catch (e) { console.error(e); }
        }

        async function loadMiniChart() {
            try {
                const res = await fetch('https://api.spot-hinta.fi/TodayAndTomorrow');
                const data = await res.json();
                
                const now = new Date(); now.setMinutes(0,0,0,0);
                const nextHours = data.filter(i => new Date(i.DateTime) >= now).slice(0, 8);
                
                const labels = nextHours.map(i => new Date(i.DateTime).getHours() + ":00");
                const prices = nextHours.map(i => parseFloat((i.PriceWithTax * 100).toFixed(1)));
                const colors = prices.map(p => p > 10 ? '#ee8888' : (p <= 5 ? '#a8dcba' : '#f7dc8f'));

                if (miniChartInstance) miniChartInstance.destroy();
                miniChartInstance = new Chart(document.getElementById('miniChart'), {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ data: prices, backgroundColor: colors, borderRadius: 4 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, datalabels: { display: true, anchor: 'end', align: 'top', font: {size: 10} } },
                        scales: { y: { display: false, suggestedMax: Math.max(...prices)*1.2 }, x: { grid: { display: false } } }
                    },
                    plugins: [ChartDataLabels]
                });
            } catch (e) { console.error(e); }
        }

        updateData(); loadMiniChart();
        setInterval(() => { updateData(); loadMiniChart(); }, 60000);
    </script>
</body>
</html>
