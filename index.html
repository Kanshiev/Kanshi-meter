<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энерго-пульт 6.0</title>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #e2f3e5;
            display: flex; justify-content: center; padding: 20px; margin: 0;
            transition: background-color 0.8s ease;
        }
        .widget-container { width: 100%; max-width: 500px; }
        .main-card {
            background: white; border-radius: 24px; padding: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .price-big { font-size: 7rem; font-weight: 900; margin: 0; line-height: 0.9; color: #1a1a1a; }
        .shelly-stats {
            display: flex; justify-content: space-around;
            margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0f0f0;
        }
        .stat-item { text-align: center; width: 50%; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #333; }
        .stat-label { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .unit { color: #666; font-size: 1.2rem; margin-top: 15px; font-weight: 500; }
        .advice-box {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; font-weight: 700; font-size: 1.2rem; padding: 15px; border-radius: 16px; margin-top: 15px;
        }
        .countdown {
            color: #555; font-size: 0.95rem; margin-top: 12px; font-weight: 600;
        }
        .chart-card { background: white; border-radius: 24px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="main-card">
        <div style="color: #444; font-weight: 500; margin-bottom: 10px;">Цена сейчас</div>
        <div class="price-big" id="current-price">--</div>
        <div class="unit">центов / кВтч</div>
        
        <div class="advice-box" id="advice-container">
            <span id="advice-icon">⌛</span>
            <span id="advice-text">Загрузка...</span>
        </div>

        <div class="countdown" id="countdown-text">Считаем время...</div>

        <div class="shelly-stats">
            <div class="stat-item">
                <div class="stat-value" id="shelly-power">Запуск</div>
                <div class="stat-label">Ватт сейчас</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="shelly-load">...</div>
                <div class="stat-label">кВт·ч сегодня</div>
            </div>
        </div>
        <div id="current-interval" style="color:#ccc; font-size: 0.75rem; margin-top: 15px;"></div>
    </div>

    <div class="chart-card">
        <canvas id="priceChart"></canvas>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    let priceChart;
    const FREE = 2, CHEAP = 5, HIGH = 10;

    async function updateAll() {
        await updatePrices();
        await updateShelly();
    }

    async function updatePrices() {
        try {
            const response = await fetch('https://api.spot-hinta.fi/TodayAndDayForward');
            const data = await response.json();
            const now = new Date();
            const quarter = Math.floor(now.getMinutes() / 15) * 15;
            const refTime = new Date(now); refTime.setMinutes(quarter, 0, 0);
            
            const searchStr = refTime.toLocaleString('sv-SE').replace(' ', 'T').substring(0, 16);
            const startIndex = data.findIndex(s => s.DateTime.includes(searchStr));

            if (startIndex !== -1) {
                const priceCents = Math.round(data[startIndex].PriceWithTax * 100);
                document.getElementById('current-price').innerText = priceCents;
                applyVisuals(priceCents);
                renderChart(data, startIndex);
            }
        } catch (e) { console.error("Ошибка цен", e); }
    }

    async function updateShelly() {
        try {
            const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/status';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
            
            const requestBody = 'id=483fdac39873&auth_key=MWEzMWI0dWlk07E8AECF7EC066046A87D6410853E336FBB1D6F260B8376F3C047EE699E8019EA03F97657F6EF690';

            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: requestBody
            });

            const res = await response.json();

            if (res.isok) {
                const emeters = res.data.device_status.emeters;
                
                // Текущая мощность (Ватт)
                let totalPower = emeters.reduce((sum, phase) => sum + phase.power, 0);
                document.getElementById('shelly-power').innerText = Math.round(totalPower);
                
                // Подсчет потребления за день (кВт·ч)
                let currentTotalWh = emeters.reduce((sum, phase) => sum + (phase.total || 0), 0);
                const todayStr = new Date().toLocaleDateString('ru-RU');
                let savedDate = localStorage.getItem('energy_date');
                let startEnergy = parseFloat(localStorage.getItem('energy_start'));

                // Если наступил новый день или зашли впервые — сохраняем стартовую точку
                if (savedDate !== todayStr || isNaN(startEnergy) || startEnergy === 0) {
                    startEnergy = currentTotalWh;
                    localStorage.setItem('energy_date', todayStr);
                    localStorage.setItem('energy_start', startEnergy);
                }

                let consumedTodayKwh = (currentTotalWh - startEnergy) / 1000;
                if (consumedTodayKwh < 0) consumedTodayKwh = 0; // Защита от багов
                
                document.getElementById('shelly-load').innerText = consumedTodayKwh.toFixed(2);
                
                document.getElementById('current-interval').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;
            } else {
                document.getElementById('shelly-power').innerText = "Ключ!";
                document.getElementById('shelly-load').innerText = "Ошибка";
            }
        } catch (e) { 
            console.error("Ошибка соединения Shelly:", e);
            document.getElementById('shelly-power').innerText = "Блок";
            document.getElementById('shelly-load').innerText = "Откл. ABP";
        }
    }

    function applyVisuals(price) {
        const b = document.body, c = document.getElementById('advice-container'), 
              t = document.getElementById('advice-text'), i = document.getElementById('advice-icon');
        if (price < FREE) {
            b.style.backgroundColor = "#00f2ff"; c.style.backgroundColor = "#00d1db"; c.style.color = "#fff";
            i.innerText = "🚀"; t.innerText = "ХАЛЯВА! ВКЛЮЧАЙ ВСЁ!";
        } else if (price < CHEAP) {
            b.style.backgroundColor = "#e2f3e5"; c.style.backgroundColor = "#d4edda"; c.style.color = "#155724";
            i.innerText = "✅"; t.innerText = "Дешево. Пользуемся!";
        } else if (price < HIGH) {
            b.style.backgroundColor = "#fff9e6"; c.style.backgroundColor = "#fff3cd"; c.style.color = "#856404";
            i.innerText = "⚖️"; t.innerText = "Нормально. Пользуемся.";
        } else {
            b.style.backgroundColor = "#fde8e8"; c.style.backgroundColor = "#f8d7da"; c.style.color = "#721c24";
            i.innerText = "❌"; t.innerText = "Дорого! Ждем.";
        }
    }

    function renderChart(data, startIndex) {
        const chartData = data.slice(startIndex, startIndex + 16);
        const labels = chartData.map(s => {
            const d = new Date(s.DateTime);
            return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
        });
        const prices = chartData.map(s => Math.round(s.PriceWithTax * 100));
        const colors = prices.map(p => p < FREE ? '#00d1db' : p < CHEAP ? '#95d5b2' : p < HIGH ? '#ffeaae' : '#ffadad');

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (priceChart) priceChart.destroy();
        priceChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: prices, backgroundColor: colors,
                    borderColor: (ctx) => ctx.dataIndex === 0 ? '#000' : 'transparent',
                    borderWidth: (ctx) => ctx.dataIndex === 0 ? 3 : 0,
                    borderRadius: 8, barPercentage: 0.9
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'center', align: 'center',
                        color: (ctx) => (prices[ctx.dataIndex] >= HIGH || prices[ctx.dataIndex] < CHEAP) ? '#fff' : '#444',
                        font: { weight: 'bold', size: 12 },
                        formatter: Math.round
                    }
                },
                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { maxRotation: 90, minRotation: 90 } } }
            }
        });
    }

    // ЛОГИКА ТАЙМЕРА (тикает каждую секунду)
    setInterval(() => {
        const now = new Date();
        const nextPeriod = new Date(now);
        // Находим следующую 15-минутную отметку (00, 15, 30, 45)
        nextPeriod.setMinutes(Math.floor(now.getMinutes() / 15) * 15 + 15, 0, 0);
        
        const diffMs = nextPeriod - now;
        const diffMins = Math.floor(diffMs / 60000);
        const diffSecs = Math.floor((diffMs % 60000) / 1000);
        
        document.getElementById('countdown-text').innerText = `Цена поменяется через ${diffMins} мин ${diffSecs} сек`;
    }, 1000);

    updateAll();
    setInterval(updateAll, 30000);
</script>
</body>
</html>
