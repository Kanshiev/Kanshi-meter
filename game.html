<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ферма Антоши 2.0 🥕</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e2f0d9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        header {
            background: #7bc043;
            color: white;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .stats { font-size: 22px; font-weight: bold; }
        
        /* Сетка 5x4 */
        .farm-zone {
            background: #8d6e63;
            padding: 10px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 440px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .plot {
            background: #5d4037;
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border: 2px solid #4e342e;
        }
        .plot.locked { background: #3e2723; border-color: #261411; }
        .plot.obstacle { background: #78909c; border-color: #455a64; }
        
        .plot .emoji { font-size: 24px; z-index: 2; }
        .plot .timer {
            font-size: 9px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 1px 3px;
            border-radius: 3px;
            position: absolute;
            bottom: 2px;
            z-index: 4;
        }
        .plot .price-tag {
            font-size: 9px;
            color: #ffeb3b;
            font-weight: bold;
            position: absolute;
            bottom: 2px;
            background: rgba(0,0,0,0.4);
            padding: 1px 2px;
            border-radius: 3px;
        }
        
        .mole {
            position: absolute;
            font-size: 26px;
            z-index: 5;
            animation: bounce 0.4s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }

        /* Блок улучшений (Полив) */
        .upgrades-panel {
            background: #e0f7fa;
            border: 2px solid #4dd0e1;
            width: 100%;
            max-width: 440px;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upgrade-info { font-size: 13px; }
        
        /* Магазин семян */
        .shop {
            background: white;
            width: 100%;
            max-width: 440px;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .shop-title { font-weight: bold; margin-bottom: 8px; text-align: center; color: #555; font-size: 14px; }
        .seed-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }
        .seed-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            background: #fafafa;
            font-size: 13px;
        }
        .seed-item.selected { border-color: #7bc043; background: #e8f5e9; }
        .seed-info { display: flex; align-items: center; gap: 8px; }

        .btn {
            background: #ffb347;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px #cc8e39;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px #cc8e39; }
        .btn:disabled { background: #ccc !important; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div class="stats">Монеты: <span id="money-display">5</span> 🪙</div>
    </header>

    <!-- Блок улучшений -->
    <div class="upgrades-panel">
        <div class="upgrade-info">
            <strong>Система полива 💧</strong><br>
            <span id="water-status">Ускоряет рост всех овощей на 20%</span>
        </div>
        <button class="btn" id="buy-water-btn" onclick="buyWaterUpgrade()">Купить за 40 🪙</button>
    </div>

    <!-- Поле 5x4 -->
    <div class="farm-zone" id="farm-grid"></div>

    <!-- Магазин -->
    <div class="shop">
        <div class="shop-title">Выбери семена для посадки:</div>
        <div class="seed-list" id="seed-market"></div>
    </div>

<script>
    let gameState = {
        money: 5,
        selectedSeed: 0,
        waterUpgrade: false,
        nextPlotPrice: 15
    };

    // 10 овощей
    const cropsCatalog = [
        { id: 0, name: "Морковь", emoji: "🥕", seedPrice: 1, sellPrice: 3, time: 60 },
        { id: 1, name: "Репка", emoji: "🧅", seedPrice: 3, sellPrice: 8, time: 90 },
        { id: 2, name: "Картошка", emoji: "🥔", seedPrice: 8, sellPrice: 22, time: 120 },
        { id: 3, name: "Брокколи", emoji: "🥦", seedPrice: 15, sellPrice: 45, time: 150 },
        { id: 4, name: "Кукуруза", emoji: "🌽", seedPrice: 30, sellPrice: 95, time: 180 },
        { id: 5, name: "Помидор", emoji: "🍅", seedPrice: 60, sellPrice: 200, time: 210 },
        { id: 6, name: "Баклажан", emoji: "🍆", seedPrice: 120, sellPrice: 410, time: 240 },
        { id: 7, name: "Тыква", emoji: "🎃", seedPrice: 250, sellPrice: 900, time: 300 },
        { id: 8, name: "Клубника", emoji: "🍓", seedPrice: 500, sellPrice: 1900, time: 360 },
        { id: 9, name: "Арбуз", emoji: "🍉", seedPrice: 1000, sellPrice: 4000, time: 420 }
    ];

    let plots = [];

    // Перемешивание массива для случайного распределения препятствий
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        // Создаем заготовку из 20 грядок
        let indices = [];
        for(let i = 0; i < 20; i++) {
            indices.push(i);
            plots.push({ state: 'locked', obstacleType: null, status: 'empty', cropId: null, timeLeft: 0, isGolden: false, hasMole: false });
        }
        
        shuffle(indices);
        
        // 3 грядки доступны сразу
        for(let i = 0; i < 3; i++) {
            plots[indices[i]].state = 'clear';
        }
        
        // 4 грядки (20% от 20) — пни и камни
        for(let i = 3; i < 7; i++) {
            plots[indices[i]].state = 'obstacle';
            plots[indices[i]].obstacleType = Math.random() > 0.5 ? '🪵' : '🪨';
        }
        
        // Остальные 13 остаются в состоянии 'locked'
        
        renderShop();
        renderGrid();
        updateUI();
        
        setInterval(gameTick, 1000);
        setInterval(spawnMole, 30000); // Крот пытается прийти каждые 30 секунд
    }

    function updateUI() {
        document.getElementById('money-display').innerText = gameState.money;
        
        // Кнопка полива
        const waterBtn = document.getElementById('buy-water-btn');
        if (gameState.waterUpgrade) {
            waterBtn.innerText = "АКТИВЕН 💧";
            waterBtn.disabled = true;
            document.getElementById('water-status').innerText = "Полив запущен! Скорость роста +20%";
        } else {
            waterBtn.disabled = false;
        }
    }

    function renderShop() {
        const market = document.getElementById('seed-market');
        market.innerHTML = '';
        cropsCatalog.forEach((crop) => {
            const item = document.createElement('div');
            item.className = `seed-item ${gameState.selectedSeed === crop.id ? 'selected' : ''}`;
            item.onclick = () => { gameState.selectedSeed = crop.id; renderShop(); };
            
            let displayTime = gameState.waterUpgrade ? Math.ceil(crop.time * 0.8) : crop.time;
            
            item.innerHTML = `
                <div class="seed-info">
                    <span style="font-size:20px">${crop.emoji}</span>
                    <div>
                        <strong>${crop.name}</strong><br>
                        <small>Рост: ${displayTime}с | Выручка: ${crop.sellPrice}🪙</small>
                    </div>
                </div>
                <div>Семена: ${crop.seedPrice} 🪙</div>
            `;
            market.appendChild(item);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = '';
        
        plots.forEach((plot, index) => {
            const div = document.createElement('div');
            div.className = 'plot';
            // Единый обработчик кликов решает проблему с пропаданием событий!
            div.onclick = () => handlePlotGeneralClick(index);

            if (plot.state === 'locked') {
                div.classList.add('locked');
                div.innerHTML = `<span class="emoji">🔒</span><div class="price-tag">${gameState.nextPlotPrice}🪙</div>`;
            } 
            else if (plot.state === 'obstacle') {
                div.classList.add('obstacle');
                div.innerHTML = `<span class="emoji">${plot.obstacleType}</span><div class="price-tag">15🪙</div>`;
            } 
            else if (plot.state === 'clear') {
                if (plot.hasMole) {
                    div.innerHTML = `<div class="mole">🦫</div>`;
                }
                
                if (plot.status === 'empty') {
                    div.innerHTML += `<span class="emoji">🟫</span>`;
                } else if (plot.status === 'growing') {
                    div.innerHTML += `<span class="emoji">🌱</span><div class="timer">${plot.timeLeft}с</div>`;
                } else if (plot.status === 'ready') {
                    const crop = cropsCatalog[plot.cropId];
                    let emojiToShow = plot.isGolden ? crop.emoji + "✨" : crop.emoji;
                    div.innerHTML += `<span class="emoji">${emojiToShow}</span><div class="timer" style="background:#4caf50">Сбор!</div>`;
                }
            }
            grid.appendChild(div);
        });
    }

    function handlePlotGeneralClick(index) {
        let plot = plots[index];

        // 1. Обезвреживание крота
        if (plot.hasMole) {
            plot.hasMole = false;
            gameState.money += 5; // Награда за бдительность
            updateUI();
            renderShop();
            renderGrid();
            return;
        }

        // 2. Расчистка пня или камня
        if (plot.state === 'obstacle') {
            if (gameState.money >= 15) {
                gameState.money -= 15;
                plot.state = 'clear';
                plot.status = 'empty';
                updateUI();
                renderShop();
                renderGrid();
            } else {
                alert("Не хватает 15 монет, чтобы выкорчевать это препятствие!");
            }
            return;
        }

        // 3. Покупка новой грядки из закрытых
        if (plot.state === 'locked') {
            if (gameState.money >= gameState.nextPlotPrice) {
                gameState.money -= gameState.nextPlotPrice;
                plot.state = 'clear';
                plot.status = 'empty';
                gameState.nextPlotPrice += 10; // Каждая следующая грядка чуть дороже
                updateUI();
                renderShop();
                renderGrid();
            } else {
                alert(`Нужно ${gameState.nextPlotPrice} монет для открытия этой грядки!`);
            }
            return;
        }

        // 4. Обычная логика грядки (Посадка / Сбор)
        if (plot.state === 'clear') {
            if (plot.status === 'empty') {
                let activeCrop = cropsCatalog[gameState.selectedSeed];
                if (gameState.money >= activeCrop.seedPrice) {
                    gameState.money -= activeCrop.seedPrice;
                    plot.status = 'growing';
                    plot.cropId = activeCrop.id;
                    
                    // Расчет времени с учетом полива (-20%)
                    let baseTime = activeCrop.time;
                    plot.timeLeft = gameState.waterUpgrade ? Math.ceil(baseTime * 0.8) : baseTime;
                    
                    plot.isGolden = Math.random() < 0.1; // 10% шанс мега-урожая
                    
                    updateUI();
                    renderShop();
                    renderGrid();
                } else {
                    alert("Не хватает монет на семена!");
                }
            } else if (plot.status === 'ready') {
                let crop = cropsCatalog[plot.cropId];
                let finalPrice = plot.isGolden ? crop.sellPrice * 3 : crop.sellPrice;
                gameState.money += finalPrice;
                
                plot.status = 'empty';
                plot.cropId = null;
                plot.isGolden = false;
                
                updateUI();
                renderShop();
                renderGrid();
            }
        }
    }

    function buyWaterUpgrade() {
        if (gameState.money >= 40 && !gameState.waterUpgrade) {
            gameState.money -= 40;
            gameState.waterUpgrade = true;
            updateUI();
            renderShop();
            renderGrid();
        } else if (!gameState.waterUpgrade) {
            alert("Нужно 40 монет для покупки полива!");
        }
    }

    function gameTick() {
        plots.forEach((plot) => {
            if (plot.state === 'clear' && plot.status === 'growing') {
                plot.timeLeft--;
                if (plot.timeLeft <= 0) {
                    plot.status = 'ready';
                }
            }
        });
        renderGrid();
    }

    function spawnMole() {
        // Крот выбирает только те грядки, где что-то растет или готово, и где его еще нет
        let validPlots = [];
        plots.forEach((plot, idx) => {
            if (plot.state === 'clear' && (plot.status === 'growing' || plot.status === 'ready') && !plot.hasMole) {
                validPlots.push(idx);
            }
        });

        if (validPlots.length > 0) {
            let randomIdx = validPlots[Math.floor(Math.random() * validPlots.length)];
            plots[randomIdx].hasMole = true;
            renderGrid();
            
            // Если крота не прогнали за 8 секунд — он уничтожает грядку
            setTimeout(() => {
                if (plots[randomIdx].hasMole) {
                    plots[randomIdx].hasMole = false;
                    plots[randomIdx].status = 'empty';
                    plots[randomIdx].cropId = null;
                    plots[randomIdx].isGolden = false;
                    renderGrid();
                }
            }, 8000);
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
