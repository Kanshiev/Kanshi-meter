<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ферма Антоши 🥕</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e2f0d9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        header {
            background: #7bc043;
            color: white;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .stats { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .btn {
            background: #ffb347;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px #cc8e39;
            transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 0 #cc8e39; }
        
        /* Зона грядок */
        .farm-zone {
            background: #8d6e63;
            padding: 15px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .plot {
            background: #5d4037;
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border: 3px solid #4e342e;
        }
        .plot .emoji { font-size: 32px; }
        .plot .timer {
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 5px;
            border-radius: 5px;
            position: absolute;
            bottom: 5px;
        }
        .mole {
            position: absolute;
            font-size: 30px;
            animation: bounce 0.5s infinite alternate;
            z-index: 10;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* Магазин семян */
        .shop {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .shop-title { font-weight: bold; margin-bottom: 10px; text-align: center; color: #555; }
        .seed-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .seed-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            background: #fafafa;
        }
        .seed-item.selected { border-color: #7bc043; background: #e8f5e9; }
        .seed-info { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="stats">Монеты: <span id="money-display">5</span> 🪙</div>
        <button class="btn" id="buy-plot-btn" onclick="buyPlot()">+ Грядка (Цена: 15 🪙)</button>
    </header>

    <div class="farm-zone" id="farm-grid">
        <!-- Грядки создаются через JS -->
    </div>

    <div class="shop">
        <div class="shop-title">выбери семена для посадки:</div>
        <div class="seed-list" id="seed-market">
            <!-- Овощи создаются через JS -->
        </div>
    </div>

<script>
    // Баланс игры
    let gameState = {
        money: 5,
        plotsCount: 3, // Стартуем с 3 грядок
        maxPlots: 9,   // Максимум места в этой области
        selectedSeed: 0, // ID выбранного семени
        plotPrice: 15
    };

    // 10 овощей с прогрессией
    const cropsCatalog = [
        { id: 0, name: "Морковь", emoji: "🥕", seedPrice: 1, sellPrice: 3, time: 60 },
        { id: 1, name: "Репка", emoji: "🧅", seedPrice: 3, sellPrice: 8, time: 90 },
        { id: 2, name: "Картошка", emoji: "🥔", seedPrice: 8, sellPrice: 22, time: 120 },
        { id: 3, name: "Брокколи", emoji: "🥦", seedPrice: 15, sellPrice: 45, time: 150 },
        { id: 4, name: "Кукуруза", emoji: "🌽", seedPrice: 30, sellPrice: 95, time: 180 },
        { id: 5, name: "Помидор", emoji: "🍅", seedPrice: 60, sellPrice: 200, time: 210 },
        { id: 6, name: "Баклажан", emoji: "🍆", seedPrice: 120, sellPrice: 410, time: 240 },
        { id: 7, name: "Тыква", emoji: "🎃", seedPrice: 250, sellPrice: 900, time: 300 },
        { id: 8, name: "Клубника", emoji: "🍓", seedPrice: 500, sellPrice: 1900, time: 360 },
        { id: 9, name: "Арбуз", emoji: "🍉", seedPrice: 1000, sellPrice: 4000, time: 420 }
    ];

    // Массив состояния грядок
    let plots = [];

    function initGame() {
        for(let i=0; i<gameState.plotsCount; i++) {
            plots.push({ status: 'empty', cropId: null, timeLeft: 0, isGolden: false, hasMole: false });
        }
        renderShop();
        renderGrid();
        updateUI();
        
        // Главный таймер игры (раз в секунду)
        setInterval(gameTick, 1000);
        // Таймер появления крота (раз в 45 секунд)
        setInterval(spawnMole, 45000);
    }

    function updateUI() {
        document.getElementById('money-display').innerText = gameState.money;
        const plotBtn = document.getElementById('buy-plot-btn');
        if(gameState.plotsCount >= gameState.maxPlots) {
            plotBtn.innerText = "Макс. грядок достигнуто";
            plotBtn.disabled = true;
            plotBtn.style.background = "#aaa";
        } else {
            gameState.plotPrice = 15 + (gameState.plotsCount - 3) * 25;
            plotBtn.innerText = `+ Грядка (Цена: ${gameState.plotPrice} 🪙)`;
        }
    }

    function renderShop() {
        const market = document.getElementById('seed-market');
        market.innerHTML = '';
        cropsCatalog.forEach((crop) => {
            const isUnlocked = gameState.money >= crop.seedPrice || crop.id === 0; 
            const item = document.createElement('div');
            item.className = `seed-item ${gameState.selectedSeed === crop.id ? 'selected' : ''}`;
            item.onclick = () => { gameState.selectedSeed = crop.id; renderShop(); };
            
            item.innerHTML = `
                <div class="seed-info">
                    <span style="font-size:24px">${crop.emoji}</span>
                    <div>
                        <strong>${crop.name}</strong><br>
                        <small>Рост: ${crop.time}с | Доход: +${crop.sellPrice - crop.seedPrice}🪙</small>
                    </div>
                </div>
                <div>Купить: ${crop.seedPrice} 🪙</div>
            `;
            market.appendChild(item);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = '';
        plots.forEach((plot, index) => {
            const div = document.createElement('div');
            div.className = 'plot';
            div.onclick = () => handlePlotClick(index);

            let emoji = '🟫'; // Пустая земля
            let timerHtml = '';

            if (plot.hasMole) {
                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerText = '🦫';
                mole.onclick = (e) => { e.stopPropagation(); whackMole(index); };
                div.appendChild(mole);
            }

            if (plot.status === 'growing') {
                emoji = '🌱';
                timerHtml = `<div class="timer">${plot.timeLeft}с</div>`;
            } else if (plot.status === 'ready') {
                const crop = cropsCatalog[plot.cropId];
                emoji = plot.isGolden ? crop.emoji + "✨" : crop.emoji;
                timerHtml = `<div class="timer" style="background:#4caf50">Сбор!</div>`;
            }

            const textSpan = document.createElement('span');
            textSpan.className = 'emoji';
            textSpan.innerText = emoji;
            div.appendChild(textSpan);
            if(timerHtml) div.innerHTML += timerHtml;

            grid.appendChild(div);
        });
    }

    function handlePlotClick(index) {
        let plot = plots[index];
        if (plot.hasMole) return; // Сначала нужно прогнать крота!

        if (plot.status === 'empty') {
            // Посадка
            let activeCrop = cropsCatalog[gameState.selectedSeed];
            if (gameState.money >= activeCrop.seedPrice) {
                gameState.money -= activeCrop.seedPrice;
                plot.status = 'growing';
                plot.cropId = activeCrop.id;
                plot.timeLeft = activeCrop.time;
                plot.isGolden = Math.random() < 0.1; // 10% шанс мутации
                updateUI();
                renderShop();
                renderGrid();
            } else {
                alert("Не хватает монет на семена!");
            }
        } else if (plot.status === 'ready') {
            // Сбор урожая
            let crop = cropsCatalog[plot.cropId];
            let finalPrice = plot.isGolden ? crop.sellPrice * 3 : crop.sellPrice;
            gameState.money += finalPrice;
            
            // Очищаем грядку
            plot.status = 'empty';
            plot.cropId = null;
            plot.isGolden = false;
            
            updateUI();
            renderShop();
            renderGrid();
        }
    }

    function buyPlot() {
        if (gameState.money >= gameState.plotPrice && gameState.plotsCount < gameState.maxPlots) {
            gameState.money -= gameState.plotPrice;
            gameState.plotsCount++;
            plots.push({ status: 'empty', cropId: null, timeLeft: 0, isGolden: false, hasMole: false });
            updateUI();
            renderShop();
            renderGrid();
        }
    }

    function gameTick() {
        plots.forEach((plot) => {
            if (plot.status === 'growing') {
                plot.timeLeft--;
                if (plot.timeLeft <= 0) {
                    plot.status = 'ready';
                }
            }
        });
        renderGrid();
    }

    function spawnMole() {
        // Крот выбирает случайную грядку
        let randomPlotIndex = Math.floor(Math.random() * plots.length);
        let plot = plots[randomPlotIndex];
        
        if (!plot.hasMole && plot.status !== 'empty') {
            plot.hasMole = true;
            renderGrid();
            
            // Если крота не поймали за 7 секунд, он портит грядку
            setTimeout(() => {
                if (plot.hasMole) {
                    plot.hasMole = false;
                    plot.status = 'empty';
                    plot.cropId = null;
                    plot.isGolden = false;
                    renderGrid();
                }
            }, 7000);
        }
    }

    function whackMole(index) {
        if (plots[index].hasMole) {
            plots[index].hasMole = false;
            gameState.money += 5; // Бонус за бдительность!
            updateUI();
            renderShop();
            renderGrid();
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
