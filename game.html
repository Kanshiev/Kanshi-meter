<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ферма Антоши 3.0 🚀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e2f0d9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        header {
            background: #7bc043;
            color: white;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 8px;
        }
        .stats { font-size: 24px; font-weight: bold; }

        /* Панель активных наёмников с анимациями */
        .active-helpers {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 8px;
        }
        .helper-badge {
            flex: 1;
            background: #fff3e0;
            border: 2px solid #ffb74d;
            border-radius: 10px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            font-weight: bold;
        }
        .animated-worker { animation: workMove 0.6s infinite alternate ease-in-out; font-size: 20px; }
        .animated-hunter { animation: huntPulse 0.5s infinite alternate ease-in-out; font-size: 20px; }
        
        @keyframes workMove { 
            from { transform: rotate(-15deg) translateX(-3px); } 
            to { transform: rotate(15deg) translateX(3px); } 
        }
        @keyframes huntPulse { 
            from { transform: scale(0.9); filter: drop-shadow(0 0 2px red); } 
            to { transform: scale(1.1); filter: drop-shadow(0 0 6px red); } 
        }
        
        /* Сетка 5x4 */
        .farm-zone {
            background: #8d6e63;
            padding: 10px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 440px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        .plot {
            background: #5d4037;
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border: 2px solid #4e342e;
        }
        .plot.locked { background: #3e2723; border-color: #261411; }
        .plot.obstacle { background: #78909c; border-color: #455a64; }
        
        .plot .emoji { font-size: 24px; z-index: 2; }
        .plot .timer {
            font-size: 9px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 1px 3px;
            border-radius: 3px;
            position: absolute;
            bottom: 2px;
            z-index: 4;
        }
        .plot .price-tag {
            font-size: 9px;
            color: #ffeb3b;
            font-weight: bold;
            position: absolute;
            bottom: 2px;
            background: rgba(0,0,0,0.6);
            padding: 1px 3px;
            border-radius: 3px;
        }
        
        .mole {
            position: absolute;
            font-size: 26px;
            z-index: 5;
            animation: molePop 0.3s ease-out;
        }
        @keyframes molePop { from { transform: scale(0); } to { transform: scale(1); } }

        /* Вкладки / Магазины */
        .shop {
            background: white;
            width: 100%;
            max-width: 440px;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tabs { display: flex; gap: 5px; margin-bottom: 8px; }
        .tab-btn {
            flex: 1; padding: 6px; border: none; background: #e0e0e0; 
            font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 12px;
        }
        .tab-btn.active { background: #7bc043; color: white; }

        .market-section { display: none; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
        .market-section.active { display: flex; }

        .seed-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; border: 2px solid #f0f0f0; border-radius: 8px;
            background: #fafafa; font-size: 13px;
        }
        .seed-item.selected { border-color: #7bc043; background: #e8f5e9; }
        .seed-info { display: flex; align-items: center; gap: 8px; }

        .btn {
            background: #ffb347; border: none; padding: 6px 12px;
            font-size: 12px; font-weight: bold; color: white;
            border-radius: 8px; cursor: pointer; box-shadow: 0 3px #cc8e39;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px #cc8e39; }
        .btn:disabled { background: #ccc !important; box-shadow: none; cursor: not-allowed; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="stats">Монеты: <span id="money-display">5</span> 🪙</div>
    </header>

    <!-- Активные помощники -->
    <div class="active-helpers" id="helpers-panel" style="display: none;">
        <!-- Сюда динамически добавляются рабочий и охотник -->
    </div>

    <!-- Поле 5x4 -->
    <div class="farm-zone" id="farm-grid"></div>

    <!-- Магазины -->
    <div class="shop">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('seeds')">🌱 Семена</button>
            <button class="tab-btn" onclick="switchTab('upgrades')">🛠️ Сервисы / Наёмники</button>
        </div>
        
        <!-- Секция семян -->
        <div class="market-section active" id="sec-seeds"></div>
        
        <!-- Секция улучшений -->
        <div class="market-section" id="sec-upgrades">
            <!-- Полив -->
            <div class="seed-item">
                <div class="seed-info">
                    <span style="font-size:20px">💧</span>
                    <div>
                        <strong>Капельный полив</strong><br>
                        <small>Ускоряет рост овощей на 20% (Навсегда)</small>
                    </div>
                </div>
                <button class="btn" id="btn-upgrade-water" onclick="buyWaterUpgrade()">40 🪙</button>
            </div>
            <!-- Охотник -->
            <div class="seed-item">
                <div class="seed-info">
                    <span style="font-size:20px">🤠</span>
                    <div>
                        <strong>Охотник на кротов</strong><br>
                        <small>Авто-удар по кротам и +5🪙 за каждого (10 мин)</small>
                    </div>
                </div>
                <button class="btn" id="btn-upgrade-hunter" onclick="buyHunter()">40 🪙</button>
            </div>
            <!-- Рабочий -->
            <div class="seed-item">
                <div class="seed-info">
                    <span style="font-size:20px">👷‍♂️</span>
                    <div>
                        <strong>Авто-Рабочий</strong><br>
                        <small>Сажает/собирает выбранный овощ (15 мин)</small>
                    </div>
                </div>
                <button class="btn" id="btn-upgrade-worker" onclick="buyWorker()">200 🪙</button>
            </div>
        </div>
    </div>

<script>
    let gameState = {
        money: 5,
        selectedSeed: 0,
        waterUpgrade: false,
        nextPlotPrice: 15,
        obstacleClearPrice: 45, // В три раза выше старта обычной грядки
        
        workerActive: false,
        workerTimeLeft: 0,
        workerCropId: null,
        
        hunterActive: false,
        hunterTimeLeft: 0
    };

    const cropsCatalog = [
        { id: 0, name: "Морковь", emoji: "🥕", seedPrice: 1, sellPrice: 3, time: 60 },
        { id: 1, name: "Репка", emoji: "🧅", seedPrice: 3, sellPrice: 8, time: 90 },
        { id: 2, name: "Картошка", emoji: "🥔", seedPrice: 8, sellPrice: 22, time: 120 },
        { id: 3, name: "Брокколи", emoji: "🥦", seedPrice: 15, sellPrice: 45, time: 150 },
        { id: 4, name: "Кукуруза", emoji: "🌽", seedPrice: 30, sellPrice: 95, time: 180 },
        { id: 5, name: "Помидор", emoji: "🍅", seedPrice: 60, sellPrice: 200, time: 210 },
        { id: 6, name: "Баклажан", emoji: "🍆", seedPrice: 120, sellPrice: 410, time: 240 },
        { id: 7, name: "Тыква", emoji: "🎃", seedPrice: 250, sellPrice: 900, time: 300 },
        { id: 8, name: "Клубника", emoji: "🍓", seedPrice: 500, sellPrice: 1900, time: 360 },
        { id: 9, name: "Арбуз", emoji: "🍉", seedPrice: 1000, sellPrice: 4000, time: 420 }
    ];

    let plots = [];

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function initGame() {
        let indices = [];
        for(let i = 0; i < 20; i++) {
            indices.push(i);
            plots.push({ state: 'locked', obstacleType: null, status: 'empty', cropId: null, timeLeft: 0, isGolden: false, hasMole: false });
        }
        shuffle(indices);
        for(let i = 0; i < 3; i++) plots[indices[i]].state = 'clear';
        for(let i = 3; i < 7; i++) {
            plots[indices[i]].state = 'obstacle';
            plots[indices[i]].obstacleType = Math.random() > 0.5 ? '🪵' : '🪨';
        }
        
        renderShop();
        renderGrid();
        updateUI();
        
        setInterval(gameTick, 1000);
        setInterval(spawnMole, 25000); // Крот прибегает раз в 25 сек
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.market-section').forEach(s => s.classList.remove('active'));
        if(tab === 'seeds') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('sec-seeds').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('sec-upgrades').classList.add('active');
        }
    }

    function formatTime(seconds) {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateUI() {
        document.getElementById('money-display').innerText = gameState.money;
        
        // Кнопка полива
        const waterBtn = document.getElementById('btn-upgrade-water');
        if(gameState.waterUpgrade) { waterBtn.innerText = "Куплено"; waterBtn.disabled = true; }

        // Обновление панели наемников под хэдером
        const helpersPanel = document.getElementById('helpers-panel');
        helpersPanel.innerHTML = '';
        let hasHelpers = false;

        if (gameState.workerActive) {
            hasHelpers = true;
            let cropEmoji = cropsCatalog[gameState.workerCropId].emoji;
            helpersPanel.innerHTML += `
                <div class="helper-badge">
                    <div class="animated-worker">👷‍♂️</div>
                    <div>Рабочий (${formatTime(gameState.workerTimeLeft)})<br><span style="font-size:9px">Растит: ${cropEmoji}</span></div>
                </div>
            `;
        }
        if (gameState.hunterActive) {
            hasHelpers = true;
            helpersPanel.innerHTML += `
                <div class="helper-badge" style="border-color:#4dd0e1; background:#e0f7fa;">
                    <div class="animated-hunter">🤠🎯</div>
                    <div>Охотник (${formatTime(gameState.hunterTimeLeft)})<br><span style="font-size:9px">Защита от кротов</span></div>
                </div>
            `;
        }
        helpersPanel.style.display = hasHelpers ? 'flex' : 'none';
    }

    function renderShop() {
        const market = document.getElementById('sec-seeds');
        market.innerHTML = '';
        cropsCatalog.forEach((crop) => {
            const item = document.createElement('div');
            item.className = `seed-item ${gameState.selectedSeed === crop.id ? 'selected' : ''}`;
            item.onclick = () => { gameState.selectedSeed = crop.id; renderShop(); };
            
            let displayTime = gameState.waterUpgrade ? Math.ceil(crop.time * 0.8) : crop.time;
            
            item.innerHTML = `
                <div class="seed-info">
                    <span style="font-size:20px">${crop.emoji}</span>
                    <div>
                        <strong>${crop.name}</strong><br>
                        <small>Рост: ${displayTime}с | Доход: ${crop.sellPrice}🪙</small>
                    </div>
                </div>
                <div>Семена: ${crop.seedPrice} 🪙</div>
            `;
            market.appendChild(item);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = '';
        
        plots.forEach((plot, index) => {
            const div = document.createElement('div');
            div.className = 'plot';
            div.onclick = () => handlePlotGeneralClick(index);

            if (plot.state === 'locked') {
                div.classList.add('locked');
                div.innerHTML = `<span class="emoji">🔒</span><div class="price-tag">${gameState.nextPlotPrice}🪙</div>`;
            } 
            else if (plot.state === 'obstacle') {
                div.classList.add('obstacle');
                div.innerHTML = `<span class="emoji">${plot.obstacleType}</span><div class="price-tag">${gameState.obstacleClearPrice}🪙</div>`;
            } 
            else if (plot.state === 'clear') {
                if (plot.status === 'empty') {
                    div.innerHTML = `<span class="emoji">🟫</span>`;
                } else if (plot.status === 'growing') {
                    div.innerHTML = `<span class="emoji">🌱</span><div class="timer">${plot.timeLeft}с</div>`;
                } else if (plot.status === 'ready') {
                    const crop = cropsCatalog[plot.cropId];
                    let emojiToShow = plot.isGolden ? crop.emoji + "✨" : crop.emoji;
                    div.innerHTML = `<span class="emoji">${emojiToShow}</span><div class="timer" style="background:#4caf50">Сбор!</div>`;
                }

                // Крот рисуется поверх земли/растения
                if (plot.hasMole) {
                    const moleDiv = document.createElement('div');
                    moleDiv.className = 'mole';
                    moleDiv.innerText = '🦫';
                    div.appendChild(moleDiv);
                }
            }
            grid.appendChild(div);
        });
    }

    function handlePlotGeneralClick(index) {
        let plot = plots[index];

        // 1. Клик по кроту (ручной)
        if (plot.state === 'clear' && plot.hasMole) {
            plot.hasMole = false;
            gameState.money += 5;
            updateUI(); renderGrid();
            return;
        }

        // 2. Выкорчевывание пней и камней (Прогрессивное!)
        if (plot.state === 'obstacle') {
            if (gameState.money >= gameState.obstacleClearPrice) {
                gameState.money -= gameState.obstacleClearPrice;
                plot.state = 'clear';
                plot.status = 'empty';
                gameState.obstacleClearPrice += 35; // Цена растёт!
                updateUI(); renderShop(); renderGrid();
            } else {
                alert(`Нужно ${gameState.obstacleClearPrice} монет для очистки этого участка!`);
            }
            return;
        }

        // 3. Покупка закрытой грядки
        if (plot.state === 'locked') {
            if (gameState.money >= gameState.nextPlotPrice) {
                gameState.money -= gameState.nextPlotPrice;
                plot.state = 'clear';
                plot.status = 'empty';
                gameState.nextPlotPrice += 10;
                updateUI(); renderShop(); renderGrid();
            } else {
                alert(`Нужно ${gameState.nextPlotPrice} монет для открытия!`);
            }
            return;
        }

        // 4. Посадка / Сбор
        if (plot.state === 'clear') {
            if (plot.status === 'empty') {
                let activeCrop = cropsCatalog[gameState.selectedSeed];
                if (gameState.money >= activeCrop.seedPrice) {
                    gameState.money -= activeCrop.seedPrice;
                    plot.status = 'growing';
                    plot.cropId = activeCrop.id;
                    plot.timeLeft = gameState.waterUpgrade ? Math.ceil(activeCrop.time * 0.8) : activeCrop.time;
                    plot.isGolden = Math.random() < 0.1;
                    updateUI(); renderGrid();
                }
            } else if (plot.status === 'ready') {
                let crop = cropsCatalog[plot.cropId];
                gameState.money += plot.isGolden ? crop.sellPrice * 3 : crop.sellPrice;
                plot.status = 'empty';
                plot.cropId = null;
                plot.isGolden = false;
                updateUI(); renderGrid();
            }
        }
    }

    // Покупка улучшений
    function buyWaterUpgrade() {
        if (gameState.money >= 40 && !gameState.waterUpgrade) {
            gameState.money -= 40; gameState.waterUpgrade = true;
            updateUI(); renderShop();
        }
    }

    function buyHunter() {
        if (gameState.money >= 40) {
            gameState.money -= 40;
            gameState.hunterActive = true;
            gameState.hunterTimeLeft += 600; // Добавляем 10 минут
            updateUI();
        } else { alert("Недостаточно монет для найма Охотника!"); }
    }

    function buyWorker() {
        if (gameState.money >= 200) {
            gameState.money -= 200;
            gameState.workerActive = true;
            gameState.workerCropId = gameState.selectedSeed; // Фиксируем овощ!
            gameState.workerTimeLeft += 900; // Добавляем 15 минут
            updateUI();
            alert(`Рабочий нанят! Он будет автоматически растить: ${cropsCatalog[gameState.workerCropId].name}`);
        } else { alert("Недостаточно монет для найма Рабочего!"); }
    }

    function gameTick() {
        // Уменьшение таймеров наёмников
        if (gameState.workerActive) {
            gameState.workerTimeLeft--;
            if (gameState.workerTimeLeft <= 0) gameState.workerActive = false;
        }
        if (gameState.hunterActive) {
            gameState.hunterTimeLeft--;
            if (gameState.hunterTimeLeft <= 0) gameState.hunterActive = false;
        }

        // Логика Охотника (Уничтожает кротов мгновенно)
        if (gameState.hunterActive) {
            plots.forEach((plot, index) => {
                if (plot.state === 'clear' && plot.hasMole) {
                    plot.hasMole = false;
                    gameState.money += 5; // Награда капает Антоше на счёт автоматического
                }
            });
        }

        // Логика Рабочего (Автоматическая посадка и сбор)
        if (gameState.workerActive) {
            let targetCrop = cropsCatalog[gameState.workerCropId];
            plots.forEach((plot, index) => {
                if (plot.state === 'clear') {
                    // Автосбор любого созревшего урожая
                    if (plot.status === 'ready') {
                        handlePlotGeneralClick(index);
                    }
                    // Автопосадка целевого овоща, если есть монеты
                    if (plot.status === 'empty' && gameState.money >= targetCrop.seedPrice && !plot.hasMole) {
                        let currentBackup = gameState.selectedSeed;
                        gameState.selectedSeed = gameState.workerCropId;
                        handlePlotGeneralClick(index);
                        gameState.selectedSeed = currentBackup;
                    }
                }
            });
        }

        // Рост растений
        plots.forEach((plot) => {
            if (plot.state === 'clear' && plot.status === 'growing') {
                plot.timeLeft--;
                if (plot.timeLeft <= 0) plot.status = 'ready';
            }
        });

        updateUI();
        renderGrid();
    }

    function spawnMole() {
        let validPlots = [];
        plots.forEach((plot, idx) => {
            if (plot.state === 'clear' && (plot.status === 'growing' || plot.status === 'ready') && !plot.hasMole) {
                validPlots.push(idx);
            }
        });

        if (validPlots.length > 0) {
            let randomIdx = validPlots[Math.floor(Math.random() * validPlots.length)];
            plots[randomIdx].hasMole = true;
            renderGrid();
            
            // Крот уходит через 8 секунд, если его не прогнали
            setTimeout(() => {
                if (plots[randomIdx] && plots[randomIdx].hasMole) {
                    plots[randomIdx].hasMole = false;
                    plots[randomIdx].status = 'empty';
                    plots[randomIdx].cropId = null;
                    plots[randomIdx].isGolden = false;
                    renderGrid();
                }
            }, 8000);
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
